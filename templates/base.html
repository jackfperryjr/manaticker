<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>{% block title %}Collection Tracker{% endblock %}</title>
<style>
    body { font-family: -apple-system, Segoe UI, sans-serif; background: #0f1115; color: #e6e6e6; margin: 0; padding: 2rem; }
    a { color: #60a5fa; text-decoration: none; }
    h1 { margin-bottom: 0.25rem; }
    .subtitle { color: #9aa0a6; margin-bottom: 1.5rem; }
    .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
    .topbar nav { display: flex; gap: 1rem; align-items: center; font-size: 0.85rem; color: #9aa0a6; }
    .flash { background: #3b2330; border: 1px solid #7f1d1d; color: #fca5a5; padding: 0.6rem 1rem; border-radius: 6px; margin-bottom: 1rem; }
    label { display: block; margin-bottom: 0.3rem; color: #9aa0a6; font-size: 0.85rem; }
    input, select { background: #1a1d24; border: 1px solid #2a2e38; color: #e6e6e6; padding: 0.5rem; border-radius: 6px; margin-bottom: 1rem; width: 100%; max-width: 360px; box-sizing: border-box; }
    button, .btn { background: #3b82f6; color: white; border: none; padding: 0.6rem 1.2rem; border-radius: 6px; cursor: pointer; font-size: 0.9rem; }
    button:hover, .btn:hover { background: #2563eb; }
    .btn-danger { background: #ef4444; }
    .btn-danger:hover { background: #dc2626; }
    .card { background: #1a1d24; border-radius: 10px; padding: 1.5rem; max-width: 420px; }
    form.inline { display: inline; }
    table { border-collapse: collapse; width: 100%; background: #1a1d24; border-radius: 10px; overflow: hidden; }
    th, td { padding: 0.5rem 0.75rem; text-align: left; font-size: 0.85rem; }
    th { background: #22262f; color: #9aa0a6; text-transform: uppercase; font-size: 0.7rem; }
    tr:nth-child(even) { background: #20232b; }
</style>
</head>
<body>
    <div class="topbar">
        <h1 style="margin:0;font-size:1.2rem;">Collection Tracker</h1>
        {% if current_user.is_authenticated %}
        <nav>
            <span>{{ current_user.email }}</span>
            <a href="{{ url_for('index') }}">Collections</a>
            <a href="{{ url_for('settings') }}">Settings</a>
            <form class="inline" action="{{ url_for('logout') }}" method="post">
                {% include "_csrf.html" %}
                <button type="submit">Log out</button>
            </form>
        </nav>
        {% endif %}
    </div>

    {% for message in get_flashed_messages() %}
    <div class="flash">{{ message }}</div>
    {% endfor %}

    {% block content %}{% endblock %}
</body>
</html>
