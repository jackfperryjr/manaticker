{% extends "base.html" %}
{% block title %}Settings - Materia Markets{% endblock %}
{% block content %}
<h2>Settings</h2>

<h3>Your collections</h3>
<table>
    <tr><th>Label</th><th></th></tr>
    {% for c in collections %}
    <tr>
        <td><a href="{{ url_for('view_collection', collection_id=c.id) }}">{{ c.label }}</a></td>
        <td>
            <div style="display:flex;gap:0.5rem;align-items:center;">
                <form class="inline" action="{{ url_for('rename_collection', collection_id=c.id) }}" method="post" style="display:flex;gap:0.5rem;align-items:center;">
                    {% include "_csrf.html" %}
                    <input type="text" name="label" value="{{ c.label }}" style="margin-bottom:0;width:160px;" required>
                    <button type="submit">Save</button>
                </form>
                <form class="inline" action="{{ url_for('delete_collection', collection_id=c.id) }}" method="post"
                      onsubmit="return confirm('Delete this collection and all of its snapshot history?');">
                    {% include "_csrf.html" %}
                    <button type="submit" class="btn-danger">Delete</button>
                </form>
            </div>
        </td>
    </tr>
    {% endfor %}
</table>
<p style="margin-top:1.5rem;"><a href="{{ url_for('new_collection') }}" class="btn">+ Add another collection</a></p>
{% endblock %}
